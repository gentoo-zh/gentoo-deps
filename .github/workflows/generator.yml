name: "Generator"
on:
  workflow_dispatch:
    inputs:
      # https://github.com/XTLS/Xray-core v24.11.11
      # net-proxy/Xray/Xray-24.11.11.ebuild
      # release artiface: ${PN}-${PV}-deps.tar.xz: Xray-24.11.11-deps.tar.xz
      # release tag: ${P}=${PN}-${PV}: Xray-24.11.11

      LANG:
        type: choice
        description: "generate golang(go-mod/vendor) or javascript(node_modules) deps"
        options:
        - golang
        - javascript
        - javascript(pnpm)
        - rust
        - dart

      REPO:
        description: "github repo name: XTLS/Xray-core"
        required: true

      TAG:
        description: "github tag: v24.11.11"
        required: true

      P:
        description: "P in ebuild: Xray-24.11.11"
        required: true

      WORKDIR:
        description: "(optional) source directory to perform scripts"
        default: ''

      VENDORDIR:
        description: "(optional) golang vendor.tar.xz, input S in ebuild: Xray-core-24.11.11"
        default: ''

jobs:
  Generator:
    permissions: write-all # required by push tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout input repo
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.REPO }}
          ref: ${{ inputs.TAG }}
          fetch-depth: 0
          submodules: true
          path: "input"

      - name: delete old tag
        env:
          P: ${{ inputs.P }}
          LANG: ${{ inputs.LANG }}
        run: |
          git config --global --add safe.directory '*'
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag --delete ${P} || echo yes

      - name: Setup go
        if: inputs.LANG == 'golang'
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Generate golang deps
        if: inputs.LANG == 'golang'
        env:
          P: ${{ inputs.P }}
          WORKDIR: ${{ inputs.WORKDIR }}
          VENDORDIR: ${{ inputs.VENDORDIR }}
        run: |
          git tag ${P} -m "${P}-deps.tar.xz ${P}-vendor.tar.xz"
          cd "input/${WORKDIR}"
          # if this module is not itself a workspace root, ignore a parent go.work (else `go mod
          # download`/`vendor` refuse to run in workspace mode)
          [[ -f go.work ]] || export GOWORK=off
          export LC_ALL=C TZ=UTC XZ_OPT="-T0 -9e"
          # reproducible tar: fixed mtime/order/owner so the same tag yields byte-identical bytes
          rtar() { tar --create --auto-compress --mtime=@0 --sort=name --owner=0 --group=0 --numeric-owner "$@"; }
          GOMODCACHE="${PWD}"/go-mod go mod download -modcacherw
          rtar --file /tmp/${P}-deps.tar.xz go-mod
          if [[ x"${VENDORDIR}" != x"" ]]; then
            rm -rf go-mod
            if [[ -f go.work ]]; then
              go work vendor -modcacherw -o ${VENDORDIR}/vendor
            else
              go mod vendor -modcacherw -o ${VENDORDIR}/vendor
            fi
            rtar --file /tmp/${P}-vendor.tar.xz ${VENDORDIR}/vendor
          fi

      - name: Generate javascript node_modules
        if: inputs.LANG == 'javascript'
        env:
          P: ${{ inputs.P }}
          WORKDIR: ${{ inputs.WORKDIR }}
        run: |
          git tag ${P} -m "${P}-node_modules.tar.xz"
          cd "input/${WORKDIR}"
          export LC_ALL=C TZ=UTC XZ_OPT="-T0 -9e"
          npm install --legacy-peer-deps --cache "${PWD}"/npm-cache
          tar --create --auto-compress --mtime=@0 --sort=name --owner=0 --group=0 --numeric-owner \
            --file /tmp/${P}-node_modules.tar.xz node_modules
          rm -rf node_modules

      - name: Setup pnpm
        if: inputs.LANG == 'javascript(pnpm)'
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Generate javascript(pnpm) node_modules
        if: inputs.LANG == 'javascript(pnpm)'
        env:
          P: ${{ inputs.P }}
          WORKDIR: ${{ inputs.WORKDIR }}
        run: |
          git tag ${P} -m "${P}-node_modules.tar.xz"
          cd "input/${WORKDIR}"
          export LC_ALL=C TZ=UTC XZ_OPT="-T0 -9e"
          # pnpm 11 blocks dependency build scripts by default (strictDepBuilds); the vendored
          # node_modules needs them (esbuild etc.), so allow them non-interactively.
          pnpm install --config.dangerouslyAllowAllBuilds=true
          tar --create --auto-compress --mtime=@0 --sort=name --owner=0 --group=0 --numeric-owner \
            --file /tmp/${P}-node_modules.tar.xz node_modules
          rm -rf node_modules

      - name: Generate rust crates
        if: inputs.LANG == 'rust'
        env:
          P: ${{ inputs.P }}
          WORKDIR: ${{ inputs.WORKDIR }}
        run: |
          git tag ${P} -m "${P}-crates.tar.xz"
          pip install pycargoebuild
          wget https://raw.githubusercontent.com/gentoo/gentoo/refs/heads/master/metadata/license-mapping.conf -O /tmp/license-mapping.conf
          cd "input/${WORKDIR}"
          # a virtual workspace root has only [workspace], no [package]; pycargoebuild must run in a
          # member (it still gathers the whole workspace's crates). Pin the output name to ${P}.
          if ! grep -q '^\[package\]' Cargo.toml && grep -q '^\[workspace\]' Cargo.toml; then
            cd "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].manifest_path | rtrimstr("/Cargo.toml")')"
          fi
          pycargoebuild --crate-tarball --crate-tarball-path "/tmp/${P}-crates.tar.xz" \
            --distdir /tmp/ --license-mapping /tmp/license-mapping.conf

      - name: Setup dart
        if: inputs.LANG == 'dart'
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Generate dart pubcache
        if: inputs.LANG == 'dart'
        env:
          P: ${{ inputs.P }}
          WORKDIR: ${{ inputs.WORKDIR }}
          PUB_CACHE: ${{ inputs.P }}/pubcache
        run: |
          git tag ${P} -m "${P}-pubcache.tar.xz"
          cd "input/${WORKDIR}"
          export LC_ALL=C TZ=UTC XZ_OPT="-T0 -9e"
          dart --disable-analytics
          dart pub get
          tar --create --auto-compress --mtime=@0 --sort=name --owner=0 --group=0 --numeric-owner \
            --file /tmp/${P}-pubcache.tar.xz ${{ inputs.P }}

      - name: push tag
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
          tags: true

      - name: upload golang deps to release artifaces
        if: inputs.LANG == 'golang'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            /tmp/${{ inputs.P }}-deps.tar.xz
          tag_name: ${{ inputs.P }}

      - name: upload golang vendor to release artifaces
        if: inputs.LANG == 'golang' && inputs.VENDORDIR != ''
        uses: softprops/action-gh-release@v3
        with:
          files: |
            /tmp/${{ inputs.P }}-vendor.tar.xz
          tag_name: ${{ inputs.P }}

      - name: upload javascript node_modules to release artifaces
        if: inputs.LANG == 'javascript'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            /tmp/${{ inputs.P }}-node_modules.tar.xz
          tag_name: ${{ inputs.P }}

      - name: upload javascript(pnpm) node_modules to release artifaces
        if: inputs.LANG == 'javascript(pnpm)'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            /tmp/${{ inputs.P }}-node_modules.tar.xz
          tag_name: ${{ inputs.P }}

      - name: upload rust crates to release artifaces
        if: inputs.LANG == 'rust'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            /tmp/*-crates.tar.xz
            input/${{ inputs.WORKDIR }}/*.ebuild
          tag_name: ${{ inputs.P }}

      - name: upload rust crates to release artifaces
        if: inputs.LANG == 'dart'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            /tmp/*-pubcache.tar.xz
          tag_name: ${{ inputs.P }}
